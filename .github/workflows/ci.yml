name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  package:
    name: Package Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: application/api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/loggia-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/loggia-api:latest

  publish-docs:
    name: Publish Docs
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate docs
        run: cargo doc --workspace --no-deps --release

      - name: Create index redirect
        run: |
          cat > target/doc/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
          <meta http-equiv="refresh" content="0; url=api/" />
          </head>
          <body>
          <p>Redirecting to <a href="api/">API documentation</a>...</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: target/doc

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

  auto-merge-dependabot:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' && !contains(github.event.pull_request.labels.*.name, 'dependencies:github-actions')
    steps:
      - name: Approve PR
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE'
            })

      - name: Enable auto-merge with squash
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            })
